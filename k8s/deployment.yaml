apiVersion: apps/v1
kind: Deployment

metadata:
  name: trend-app
  namespace: trend-app
  labels:
    app: trend-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: trend-app

  template:
    metadata:
      labels:
        app: trend-app

    spec:
      containers:
      - name: trend-app
        image: viyas18/trend-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80
